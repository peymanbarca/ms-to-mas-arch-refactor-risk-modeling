sonar.projectKey=ms-to-mas-retailben
sonar.projectName=MS to MAS - RetailBen Microservices
sonar.projectVersion=1.0

# Source code directory (analyze all Python files in ms_baseline/retailben)
sonar.sources=ms_baseline/retailben

# Language set to Python
sonar.language=py

# Python version
sonar.python.version=3.11

# Include all Python files
sonar.inclusions=**/*.py

# Exclude tests and __pycache__
sonar.exclusions=**/__pycache__/**,**/test_*.py,**/*_test.py,**/venv/**,**/virtualenv/**

# Code coverage (optional - you can add pytest coverage reports)
# sonar.python.coverage.reportPaths=coverage.xml

# CPD detection (to detect duplicated code)
sonar.cpd.exclusions=**/__init__.py

# Analysis logs
sonar.log.level=INFO
