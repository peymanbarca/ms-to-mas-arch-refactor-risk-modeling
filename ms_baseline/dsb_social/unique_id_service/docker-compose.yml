# Drop-in replacement for the original C++ unique-id-service block.
# The hostname, port, and volume mount are identical to docker-compose.yml
# so all callers (ComposePostService) can connect without changes.

version: "3.8"

services:

  # -----------------------------------------------------------------------
  # Unique-ID Service (Python port)
  # -----------------------------------------------------------------------
  unique-id-service:
    build:
      context: ./unique-id-service
      dockerfile: Dockerfile
    image: social-network-py/unique-id-service:latest
    hostname: unique-id-service
    restart: always
    ports:
      - "10008:9090"           # same external port as original
    depends_on:
      jaeger-agent:
        condition: service_started
    volumes:
      - ./config:/app/config   # service-config.json injected at runtime
    environment:
      # Override machine_id per-replica when scaling:
      #   MACHINE_ID=1  then pass --machine-id $MACHINE_ID to server.py
      PYTHONUNBUFFERED: "1"

  # -----------------------------------------------------------------------
  # Jaeger all-in-one (for local dev; matches the original docker-compose)
  # -----------------------------------------------------------------------
  jaeger-agent:
    image: jaegertracing/all-in-one:latest
    ports:
      - "6831:6831/udp"   # agent UDP
      - "16686:16686"     # UI
    environment:
      COLLECTOR_ZIPKIN_HTTP_PORT: 9411
